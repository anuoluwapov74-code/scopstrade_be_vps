{% extends "dashboard/base.html" %}
{% block title %}{{ stock.symbol }} - ScopTrade Admin{% endblock %}
{% block page_title %}{{ stock.symbol }}{% endblock %}

{% block content %}
<div class="max-w-sm">
    <div class="flex items-center gap-3 mb-6">
        <a href="{% url 'dashboard:stocks_list' %}" class="text-sm text-gray-400 hover:text-gray-600 transition">
            <i class="fas fa-arrow-left mr-1"></i> Back to Stocks
        </a>
    </div>

    <div class="bg-white rounded-xl border border-gray-200/60 p-6">
        <div class="flex items-center gap-4 mb-6">
            <div class="w-16 h-16 bg-indigo-100 rounded-full flex items-center justify-center text-indigo-600 text-xl font-bold">{{ stock.symbol|slice:":2" }}</div>
            <div>
                <h2 class="text-xl font-bold text-gray-800">{{ stock.symbol }}</h2>
                <p class="text-sm text-gray-500">{{ stock.name }}</p>
            </div>
        </div>

        <div class="flex gap-3">
            <a href="{% url 'dashboard:stock_edit' stock.id %}"
                class="px-6 py-2.5 bg-indigo-600 text-white rounded-lg text-sm font-medium hover:bg-indigo-500 transition">
                <i class="fas fa-edit mr-1"></i> Edit
            </a>
            <a href="{% url 'dashboard:stock_delete' stock.id %}"
                class="px-6 py-2.5 bg-red-50 text-red-600 rounded-lg text-sm font-medium hover:bg-red-100 transition">
                <i class="fas fa-trash mr-1"></i> Delete
            </a>
        </div>
    </div>
</div>
{% endblock %}
